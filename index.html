<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Shooter Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            pointer-events: none;
            z-index: 20;
        }

        /* ── CROSSHAIR ── */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        /* Outer ring */
        #crosshair::before {
            content: '';
            display: block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
        }

        /* Center dot */
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.7);
        }

        /* ── GAME ACTION BUTTONS (bottom-right, mobile-style) ── */
        #action-buttons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
            z-index: 15;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .action-btn:active,
        .action-btn.active {
            background: rgba(255, 200, 50, 0.35);
            border-color: #ffc832;
            transform: scale(0.92);
        }

        /* Keyboard hint below button */
        .action-btn span.key-hint {
            display: block;
            font-size: 8px;
            opacity: 0.5;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div id="loading">Loading Map...</div>
    <div id="crosshair"></div>

    <!-- Action buttons (bottom-right, mobile game style) -->
    <div id="action-buttons">
        <button id="btn-sit" class="action-btn" type="button">
            Sit<span class="key-hint">[C]</span>
        </button>
        <button id="btn-jump" class="action-btn" type="button">
            Jump<span class="key-hint">[Space]</span>
        </button>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
