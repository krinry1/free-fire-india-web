<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Multiplayer Shooter Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            pointer-events: none;
            z-index: 20;
        }

        /* ── CROSSHAIR ── */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        #crosshair::before {
            content: '';
            display: block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
        }

        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.7);
        }

        /* ── COMMON BUTTON STYLES ── */
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .action-btn:active,
        .action-btn.active {
            background: rgba(255, 200, 50, 0.35);
            border-color: #ffc832;
            transform: scale(0.92);
        }

        .action-btn span.key-hint {
            display: block;
            font-size: 8px;
            opacity: 0.5;
            margin-top: 2px;
        }

        /* ── RIGHT SIDE ACTION BUTTONS ── */
        #action-buttons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
            z-index: 15;
        }

        /* ── VIRTUAL JOYSTICK (bottom-left) ── */
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 140px;
            height: 140px;
            z-index: 15;
            touch-action: none;
        }

        #joystick-base {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.25);
            position: relative;
        }

        #joystick-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            border: 2px solid rgba(255, 255, 255, 0.6);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background 0.1s;
        }

        #joystick-thumb.active {
            background: rgba(255, 200, 50, 0.5);
            border-color: #ffc832;
        }

        /* ── RUN BUTTON (above joystick) ── */
        #btn-run {
            position: absolute;
            bottom: 170px;
            left: 55px;
            z-index: 15;
            width: 50px;
            height: 50px;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <div id="loading">Loading Map...</div>
    <div id="crosshair"></div>

    <!-- Fullscreen button (top-right) -->
    <button id="btn-fullscreen" class="action-btn" type="button"
        style="position: absolute; top: 15px; right: 15px; z-index: 20; width: 45px; height: 45px; font-size: 10px;">
        FS
    </button>

    <!-- Virtual Joystick (bottom-left) -->
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-thumb"></div>
        </div>
    </div>

    <!-- Run / Sprint button (above joystick) -->
    <button id="btn-run" class="action-btn" type="button">
        Run
    </button>

    <!-- Right-side action buttons -->
    <div id="action-buttons">
        <button id="btn-sit" class="action-btn" type="button">
            Sit<span class="key-hint">[C]</span>
        </button>
        <button id="btn-jump" class="action-btn" type="button">
            Jump<span class="key-hint">[Space]</span>
        </button>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
        // ── FULLSCREEN BUTTON ──
        document.getElementById('btn-fullscreen').addEventListener('pointerdown', function (e) {
            e.preventDefault();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(function () {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function () { });
                    }
                }).catch(function () { });
            } else {
                document.exitFullscreen().catch(function () { });
            }
        });

        // ── VIRTUAL JOYSTICK ──
        (function () {
            var zone = document.getElementById('joystick-zone');
            var thumb = document.getElementById('joystick-thumb');
            var baseRadius = 70; // half of 140px
            var maxDist = 50;    // max thumb travel
            var activePointerId = null;
            var centerX = 0, centerY = 0;

            zone.addEventListener('pointerdown', function (e) {
                if (activePointerId !== null) return;
                e.preventDefault();
                activePointerId = e.pointerId;
                zone.setPointerCapture(e.pointerId);
                var rect = zone.getBoundingClientRect();
                centerX = rect.left + baseRadius;
                centerY = rect.top + baseRadius;
                thumb.classList.add('active');
                handleMove(e.clientX, e.clientY);
            });

            zone.addEventListener('pointermove', function (e) {
                if (e.pointerId !== activePointerId) return;
                e.preventDefault();
                handleMove(e.clientX, e.clientY);
            });

            zone.addEventListener('pointerup', function (e) {
                if (e.pointerId !== activePointerId) return;
                reset();
            });
            zone.addEventListener('pointercancel', function (e) {
                if (e.pointerId !== activePointerId) return;
                reset();
            });

            function handleMove(clientX, clientY) {
                var dx = clientX - centerX;
                var dy = clientY - centerY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }
                // Move thumb visually
                thumb.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';

                // Map to WASD thresholds (deadzone = 15px)
                var dead = 15;
                // dy negative = forward (W), positive = backward (S)
                // dx negative = left (A), positive = right (D)
                window._joystickW = dy < -dead;
                window._joystickS = dy > dead;
                window._joystickA = dx < -dead;
                window._joystickD = dx > dead;

                // Analog joystick axes: -1 to 1 (normalised by maxDist)
                // X: right = +1, left = -1
                // Y: forward = +1 (screen up = negative dy), backward = -1
                var nx = dx / maxDist;
                var ny = -dy / maxDist; // invert so "up on screen" = forward = +1
                // Apply analog deadzone
                var analogDead = dead / maxDist; // ~0.3
                var aDist = Math.sqrt(nx * nx + ny * ny);
                if (aDist < analogDead) { nx = 0; ny = 0; }
                window._joystickX = nx;
                window._joystickY = ny;
            }

            function reset() {
                activePointerId = null;
                thumb.classList.remove('active');
                thumb.style.transform = 'translate(-50%, -50%)';
                window._joystickW = false;
                window._joystickS = false;
                window._joystickA = false;
                window._joystickD = false;
                window._joystickX = 0;
                window._joystickY = 0;
            }

            // Initialize
            window._joystickW = false;
            window._joystickS = false;
            window._joystickA = false;
            window._joystickD = false;
            window._joystickX = 0;
            window._joystickY = 0;
        })();

        // ── RUN / SPRINT BUTTON (toggle) ──
        (function () {
            var btn = document.getElementById('btn-run');
            var sprinting = false;
            btn.addEventListener('pointerdown', function (e) {
                e.preventDefault();
                sprinting = !sprinting;
                btn.classList.toggle('active', sprinting);
                btn.textContent = sprinting ? 'Walk' : 'Run';
                window._isSprinting = sprinting;
            });
            window._isSprinting = false;
        })();
    </script>
</body>

</html>
