<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Free Fire India Web</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #ffc832;
            --primary-glow: rgba(255, 200, 50, 0.5);
            --danger: #ff3c3c;
            --glass: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: none; /* Hidden until game starts */
        }

        /* ── OVERLAYS ── */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s ease;
        }

        #login-screen {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/ui/login_bg.png');
        }

        #lobby-screen {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/ui/lobby_bg.png');
            display: none;
        }

        /* ── LOADING BAR ── */
        #loading-container {
            position: absolute;
            bottom: 15%;
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        #loading-status {
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            font-size: 14px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #fff);
            box-shadow: 0 0 15px var(--primary-glow);
            transition: width 0.3s ease;
        }

        /* ── PREMIUM BUTTONS ── */
        .premium-btn {
            padding: 18px 50px;
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            background: var(--primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .premium-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .premium-btn:active {
            transform: scale(0.95);
        }

        #btn-start-game {
            position: absolute;
            bottom: 60px;
            right: 60px;
        }

        /* ── GAME HUD ── */
        #game-ui {
            display: none;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #game-ui > * {
            pointer-events: auto;
        }

        /* ── CROSSHAIR ── */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        #crosshair::before {
            content: '';
            display: block;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── COMBAT UI ── */
        #combat-ui {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 20;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .hp-container {
            width: 260px;
            height: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        #player-hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── MATCH UI ── */
        #match-score-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hp-center-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .hp-center-container .hp-label {
            color: white;
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 4px;
            text-shadow: 1px 1px 2px #000;
        }

        /* ── MATCH OVER OVERLAY ── */
        #match-over-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #match-over-text {
            font-size: 80px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 30px;
        }

        /* ── CONTROLS UI ── */
        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s, border-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .action-btn:active, .action-btn.active {
            background: var(--primary-glow);
            border-color: var(--primary);
            transform: scale(0.9);
        }

        .key-hint {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 3px;
        }

        #joystick-zone {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 180px;
            height: 180px;
            z-index: 15;
            touch-action: none;
        }

        #joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.12);
            position: relative;
            backdrop-filter: blur(3px);
        }

        #joystick-thumb {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.35);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background 0.2s;
        }

        #joystick-thumb.active {
            background: var(--primary-glow);
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        #action-buttons {
            position: absolute;
            bottom: 50px;
            right: 50px;
            display: flex;
            gap: 20px;
            z-index: 15;
        }

        #btn-run {
            position: absolute;
            bottom: 250px;
            left: 105px;
            width: 60px;
            height: 60px;
        }
    </style>
</head>

<body>
    <!-- ── LOGIN SCREEN ── -->
    <div id="login-screen" class="overlay">
        <div id="loading-container">
            <div id="loading-status">Downloading Game Data... 0%</div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
        </div>
        <button id="btn-login" class="premium-btn" style="display: none;">
            GUEST LOGIN
        </button>
    </div>

    <!-- ── LOBBY SCREEN ── -->
    <div id="lobby-screen" class="overlay">
        <h1 style="position: absolute; top: 60px; left: 60px; font-size: 54px; font-weight: 900; text-shadow: 0 0 30px rgba(0,0,0,0.6); letter-spacing: 2px;">VIBE LOBBY</h1>
        <button id="btn-start-game" class="premium-btn">
            START MATCH
        </button>
    </div>

    <!-- ── GAME HUD ── -->
    <div id="game-ui">
        <div id="match-score-bar">Round 1 | You: 0 - Bot: 0</div>
        
        <div id="crosshair"></div>
        
        <!-- Action Buttons -->
        <div id="controls-ui">
            <button class="action-btn" id="btn-fire">FIRE<div class="key-hint">LMB</div></button>
            <button class="action-btn" id="btn-run">RUN<div class="key-hint">[R]</div></button>
            <button class="action-btn" id="btn-sit">SIT<div class="key-hint">[C]</div></button>
            <button class="action-btn" id="btn-jump">JUMP<div class="key-hint">SPACE</div></button>
        </div>

        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>

        <button id="btn-run" class="action-btn">
            RUN <span class="key-hint">[R]</span>
        </button>

        <div id="action-buttons">
            <button id="btn-attack" class="action-btn" style="background: rgba(255, 60, 60, 0.4); border-color: var(--danger); width: 85px; height: 85px;">
                FIRE <span class="key-hint">LMB</span>
            </button>
            <button id="btn-sit" class="action-btn">
                SIT <span class="key-hint">[C]</span>
            </button>
            <button id="btn-jump" class="action-btn">
                JUMP <span class="key-hint">SPACE</span>
            </button>
        </div>
    </div>

    <div id="game-container"></div>

    <script type="module" src="/src/main.js"></script>

    <script>
        // ── JOYSTICK LOGIC ──
        (function () {
            const zone = document.getElementById('joystick-zone');
            const thumb = document.getElementById('joystick-thumb');
            const maxDist = 70;
            let activePointerId = null;
            let centerX = 0, centerY = 0;

            zone.addEventListener('pointerdown', (e) => {
                if (activePointerId !== null) return;
                e.preventDefault();
                activePointerId = e.pointerId;
                zone.setPointerCapture(e.pointerId);
                const rect = zone.getBoundingClientRect();
                centerX = rect.left + rect.width / 2;
                centerY = rect.top + rect.height / 2;
                thumb.classList.add('active');
                handleMove(e.clientX, e.clientY);

                // Fullscreen on first interaction
                if (window.requestFullScreen) window.requestFullScreen();
            });

            zone.addEventListener('pointermove', (e) => {
                if (e.pointerId !== activePointerId) return;
                e.preventDefault();
                handleMove(e.clientX, e.clientY);
            });

            zone.addEventListener('pointerup', reset);
            zone.addEventListener('pointercancel', reset);

            function handleMove(clientX, clientY) {
                let dx = clientX - centerX;
                let dy = clientY - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }

                thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

                // Update WASD thresholds for legacy support
                const dead = 15;
                window._joystickW = dy < -dead;
                window._joystickS = dy > dead;
                window._joystickA = dx < -dead;
                window._joystickD = dx > dead;

                // Analog axes (-1 to 1)
                window._joystickX = dx / maxDist;
                window._joystickY = -dy / maxDist; // Forward is positive
            }

            function reset() {
                activePointerId = null;
                thumb.classList.remove('active');
                thumb.style.transform = 'translate(-50%, -50%)';
                window._joystickW = window._joystickS = window._joystickA = window._joystickD = false;
                window._joystickX = window._joystickY = 0;
            }

            window.requestFullScreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock('landscape').catch(() => {});
                        }
                    }).catch(() => {});
                }
            };
        })();

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
             if (window.requestFullScreen) window.requestFullScreen();
        });
    </script>
</body>

</html>
